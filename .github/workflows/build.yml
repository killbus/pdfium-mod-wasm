name: PDFium WASM Build

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        type: choice
        options: [dev, release]
        default: release
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent concurrent builds
concurrency:
  group: pdfium-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    # CRITICAL: Fix "Argument list too long" error
    # GitHub Actions has a bug where environment variables accumulate causing shell level overflow
    # Solution: Use custom shell without profile/rc files to prevent variable inheritance
    defaults:
      run:
        shell: bash --noprofile --norc -eo pipefail {0}
    
    steps:
      # ============ Basic Setup ============
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          
          # Remove large unnecessary packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          sudo apt-get clean
          
          echo "Disk space after cleanup:"
          df -h
      
      # ============ Environment Setup ============
      # CRITICAL FIX: Do NOT write to $GITHUB_ENV to prevent "Argument list too long"
      # GitHub Actions accumulates ALL env vars across steps, exceeding kernel ARG_MAX limit
      # Instead: Use step-level 'env:' or inline variables where needed
      - name: Set environment variables
        run: |
          echo "Environment variables will be set at step level to prevent pollution"
          echo "This prevents the 'Argument list too long' error in depot_tools"
          
          # Variables are defined below in each step's 'env:' section
          # Do NOT use >> $GITHUB_ENV as it causes cumulative env var bloat
      
      # ============ Cache Strategy ============
      - name: Cache Emscripten SDK
        id: cache-emsdk
        uses: actions/cache@v4
        with:
          path: /opt/emsdk
          key: emsdk-3.1.70-${{ runner.os }}-v2
      
      - name: Cache depot_tools
        id: cache-depot-tools
        uses: actions/cache@v4
        with:
          path: /opt/depot-tools
          key: depot-tools-${{ runner.os }}-${{ hashFiles('.github/workflows/pdfium-build.yml') }}
          restore-keys: |
            depot-tools-${{ runner.os }}-
      
      - name: Cache CIPD bootstrap
        id: cache-cipd
        uses: actions/cache@v4
        with:
          path: |
            /opt/pdfium-bootstrap
            ~/.vpython-root
            ~/.cipd
          key: cipd-bootstrap-${{ runner.os }}-v2
      
      - name: Cache Rust toolchain
        id: cache-rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-toolchain-${{ runner.os }}-v1
      
      # ============ System Dependencies (from Dockerfile) ============
      - name: Install base system packages
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config autoconf automake libtool ragel git yasm \
            subversion lsb-release tzdata tini \
            curl build-essential rsync python3 python3-pip
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      # ============ Emscripten SDK 3.1.70 (from Dockerfile emsdk-base) ============
      - name: Install Emscripten SDK 3.1.70
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git /opt/emsdk
          cd /opt/emsdk
          ./emsdk install 3.1.70 --shallow
          ./emsdk activate 3.1.70
      
      - name: Setup Emscripten environment
        run: |
          cd /opt/emsdk
          source ./emsdk_env.sh
          
          # Add to PATH
          echo "/opt/emsdk" >> $GITHUB_PATH
          echo "/opt/emsdk/upstream/emscripten" >> $GITHUB_PATH
          echo "/opt/emsdk/upstream/bin" >> $GITHUB_PATH
          
          # Only export essential Emscripten vars (prevent env pollution)
          echo "EMSDK=$EMSDK" >> $GITHUB_ENV
          echo "EM_CONFIG=$EM_CONFIG" >> $GITHUB_ENV
          
          # Verify
          emcc --version
      
      # ============ depot_tools (from Dockerfile depot-tools stage) ============
      - name: Setup depot_tools
        run: |
          if [ ! -d "/opt/depot-tools" ]; then
            git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git /opt/depot-tools
          fi
          
          echo "/opt/depot-tools" >> $GITHUB_PATH
          
          # Disable auto-update
          export DEPOT_TOOLS_UPDATE=0
          echo "DEPOT_TOOLS_UPDATE=0" >> $GITHUB_ENV
          
          # Reset shell level to prevent accumulation
          export SHLVL=1
          
          /opt/depot-tools/update_depot_tools || echo "update_depot_tools completed"
          /opt/depot-tools/gclient --version
      
      # ============ CIPD Bootstrap (from Dockerfile pdfium-bootstrap + build.sh) ============
      - name: Bootstrap CIPD packages
        if: steps.cache-cipd.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/pdfium-bootstrap
          cd /opt/pdfium-bootstrap
          
          # Use clean environment to prevent "Argument list too long" error
          # GitHub Actions accumulates env vars that exceed kernel ARG_MAX limit
          env -i \
            HOME="$HOME" \
            PATH="/opt/depot-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            DEPOT_TOOLS_UPDATE=0 \
            SHLVL=1 \
            bash -c 'gclient config --unmanaged https://pdfium.googlesource.com/pdfium.git'
          
          env -i \
            HOME="$HOME" \
            PATH="/opt/depot-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            DEPOT_TOOLS_UPDATE=0 \
            SHLVL=1 \
            bash -c 'gclient sync --no-history --shallow'
          
          echo "✅ CIPD cache ready"
      
      # ============ PDFium Build Dependencies (from Dockerfile pdfium-deps) ============
      - name: Install PDFium build dependencies
        run: |
          cd /opt/pdfium-bootstrap
          bash -x ./pdfium/build/install-build-deps.sh --no-prompt
      
      # ============ Rust toolchain (from Dockerfile pdfium-deps) ============
      - name: Install Rust toolchain with watchexec
        if: steps.cache-rust.outputs.cache-hit != 'true'
        run: |
          curl -sSf https://sh.rustup.rs | bash -s -- -y
          source "$HOME/.cargo/env"
          cargo install --locked watchexec-cli
          strip "$HOME/.cargo/bin/watchexec"
          rm -rf "$HOME/.cargo/registry" "$HOME/.cargo/git"
      
      - name: Add Rust to PATH
        run: |
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      # ============ Prepare Build Structure ============
      - name: Create build directories
        run: |
          mkdir -p packages/pdfium/pdfium-src/out/wasm
          mkdir -p /opt/work/pdfium-src
      
      # ============ gclient Sync (from build.sh step 0) ============
      - name: Sync PDFium dependencies
        env:
          SRC: ${{ github.workspace }}/packages/pdfium/pdfium-src
        run: |
          cd $GITHUB_WORKSPACE
          
          # Check if toolchain already exists
          if [[ ! -d "$SRC/third_party/llvm-build" ]]; then
            echo "⏬ First-time gclient sync..."
            
            cat > "$GITHUB_WORKSPACE/.gclient" <<'EOF'
          solutions = [
            { "name": "packages/pdfium/pdfium-src",
              "url":  "https://pdfium.googlesource.com/pdfium.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
            },
          ]
          EOF
            
            # Clean environment for gclient to prevent argument list overflow
            env -i \
              HOME="$HOME" \
              PATH="/opt/depot-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
              DEPOT_TOOLS_UPDATE=0 \
              SHLVL=1 \
              bash -c 'cd packages/pdfium/pdfium-src && gclient sync --no-history --shallow --nohooks --deps=builder'
            
            rm "$GITHUB_WORKSPACE/.gclient"
          else
            echo "✅ Toolchain already synced"
          fi
      
      # ============ Apply Build Patches (from build.sh 0.5) ============
      - name: Apply build patches
        env:
          PDFIUM: ${{ github.workspace }}/packages/pdfium
          SRC: ${{ github.workspace }}/packages/pdfium/pdfium-src
        run: |
          echo "🔧 Patching PDFium build files..."
          
          # Copy patched build configs
          cp -f "$PDFIUM/build/patch/build/config/BUILDCONFIG.gn" \
                "$SRC/build/config/BUILDCONFIG.gn" || echo "No BUILDCONFIG.gn patch"
          
          cp -f "$PDFIUM/build/patch/build/toolchain/wasm/BUILD.gn" \
                "$SRC/build/toolchain/wasm/BUILD.gn" || echo "No BUILD.gn patch"
      
      # ============ GN Generate (from build.sh) ============
      - name: Generate build configuration with GN
        run: |
          # Define paths inline to avoid environment pollution
          WORKSPACE="$GITHUB_WORKSPACE"
          SRC="$WORKSPACE/packages/pdfium/pdfium-src"
          OUT="$SRC/out/wasm"
          
          if [[ ! -f "$OUT/args.gn" ]]; then
            echo "🏗️ Generating GN build configuration..."
            
            # CRITICAL: Use clean environment with paths defined INSIDE bash -c
            # This prevents GitHub Actions environment pollution from exceeding ARG_MAX
            env -i \
              HOME="$HOME" \
              PATH="/opt/depot-tools:/opt/emsdk/upstream/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
              DEPOT_TOOLS_UPDATE=0 \
              EMSDK="/opt/emsdk" \
              EM_CONFIG="/opt/emsdk/.emscripten" \
              SHLVL=1 \
              bash -c "\
                SRC='$SRC'\
                OUT='$OUT'\
                gn gen \$OUT --root \$SRC --args='is_debug=false treat_warnings_as_errors=false pdf_use_skia=false pdf_enable_xfa=false pdf_enable_v8=false is_component_build=false clang_use_chrome_plugins=false pdf_is_standalone=true use_debug_fission=false use_custom_libcxx=false use_sysroot=false pdf_is_complete_lib=true pdf_use_partition_alloc=false is_clang=false symbol_level=0'\
              "
            
            # Append WASM target config
            { echo 'target_os="wasm"'; echo 'target_cpu="wasm"'; } >> "$OUT/args.gn"
          else
            echo "✅ GN already configured"
          fi
      
      # ============ Build PDFium with Ninja (from build.sh) ============
      - name: Build PDFium WASM
        env:
          SRC: ${{ github.workspace }}/packages/pdfium/pdfium-src
          OUT: ${{github.workspace }}/packages/pdfium/pdfium-src/out/wasm
        run: |
          echo "🛠️ Building PDFium..."
          
          # Ninja is a real binary, but use minimal env for consistency and safety
          env -i \
            HOME="$HOME" \
            PATH="/opt/depot-tools:/opt/emsdk/upstream/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            EMSDK="/opt/emsdk" \
            bash -c "cd '$SRC' && ninja -C '$OUT' pdfium -v"
        timeout-minutes: 60
      
      # ============ Generate Exports (from build.sh gen_exports) ============
      - name: Generate export lists
        env:
          PDFIUM: ${{ github.workspace }}/packages/pdfium
          SRC: ${{ github.workspace }}/packages/pdfium/pdfium-src
        run: |
          cd $GITHUB_WORKSPACE
          
          WS=$PDFIUM/build/wasm
          rm -rf "$WS" && mkdir -p "$WS"
          
          # Generate all.h with public headers
          ( cd "$SRC" &&
            find public -path public/cpp -prune -o -name '*.h' -print |
            sort | sed 's|^|#include "|;s|$|"|' ) > "$WS/all.h"
          
          # Add custom extension API
          echo '#include "../build/code/cpp/ext_api.h"' >> "$WS/all.h"
          
          # Generate AST
          clang -std=c11 -I"$SRC" -I"$GITHUB_WORKSPACE/build/code/cpp" \
                -fsyntax-only -Xclang -ast-dump=json "$WS/all.h" > "$WS/ast.json"
          
          # Run generator scripts
          node "$PDFIUM/build/generate-functions.mjs" "$WS/ast.json" "$WS"
          node "$PDFIUM/build/generate-runtime-methods.mjs" "$WS"
      
      # ============ Compile WASM outputs (from build.sh) ============
      - name: Compile WASM artifacts
        env:
          PDFIUM: ${{ github.workspace }}/packages/pdfium
        run: |
          cd "$PDFIUM/build"
          
          # Generate ESM and CJS outputs
          bash ./compile.esm.sh
          bash ./compile.sh
          
          # Copy to vendor directory
          mkdir -p "$PDFIUM/src/vendor"
          cp -f ./wasm/{runtime-methods.ts,functions.ts,pdfium.wasm,pdfium.js,pdfium.cjs} "$PDFIUM/src/vendor/"
          
          echo "✅ pdfium.wasm (ESM + CJS) ready"
      
      # ============ Collect Artifacts ============
      - name: Collect build artifacts
        run: |
          mkdir -p dist
          
          # Copy WASM build outputs
          cp -r packages/pdfium/build/wasm/* dist/ || true
          cp packages/pdfium/pdfium-src/out/wasm/obj/libpdfium.a dist/ || true
          
          # Copy vendor outputs
          cp -r packages/pdfium/src/vendor/* dist/ || true
          
          # Generate metadata
          cat > dist/build-info.json <<EOF
          {
            "build_mode": "${{ github.event.inputs.build_mode || 'release' }}",
            "build_timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "emscripten_version": "3.1.70",
            "workflow_run_id": "${{ github.run_id }}",
            "workflow_run_number": "${{ github.run_number }}",
            "git_commit": "${{ github.sha }}",
            "git_ref": "${{ github.ref }}",
            "repository": "${{ github.repository }}"
          }
          EOF
          
          echo "::group::Build Artifacts"
          ls -lhR dist/
          cat dist/build-info.json
          echo "::endgroup::"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfium-wasm-build-${{ github.run_number }}
          path: dist/
          retention-days: 7
          compression-level: 9
      
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            packages/pdfium/pdfium-src/out/wasm/*.log
            packages/pdfium/build/wasm/*.log
          if-no-files-found: ignore
          retention-days: 3